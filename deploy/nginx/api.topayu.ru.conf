# api.topayu.ru → api-gateway (:8080)
# sudo cp deploy/nginx/api.topayu.ru.conf /etc/nginx/sites-available/api.topayu.ru
# sudo ln -sf /etc/nginx/sites-available/api.topayu.ru /etc/nginx/sites-enabled/api.topayu.ru
# sudo rm -f /etc/nginx/sites-enabled/blog-platform
# sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name api.topayu.ru;

    client_max_body_size 120m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.topayu.ru;

    ssl_certificate     /etc/letsencrypt/live/api.topayu.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.topayu.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 120m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
