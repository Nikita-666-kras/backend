# admin.topayu.ru → admin-ui (:8088)
# sudo cp deploy/nginx/admin.topayu.ru.conf /etc/nginx/sites-available/admin.topayu.ru
# sudo ln -sf /etc/nginx/sites-available/admin.topayu.ru /etc/nginx/sites-enabled/admin.topayu.ru
# sudo nginx -t && sudo systemctl reload nginx
# sudo certbot --nginx -d admin.topayu.ru

server {
    listen 80;
    listen [::]:80;
    server_name admin.topayu.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.topayu.ru;

    ssl_certificate     /etc/letsencrypt/live/admin.topayu.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.topayu.ru/privkey.pem;
    include /etc/nginx/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 120m;

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_request_buffering off;
    }
}
