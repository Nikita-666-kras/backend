# blog-platform API · topayu.ru
# Скопировать на VPS:
#   /etc/nginx/sites-available/topayu.ru
#   ln -s /etc/nginx/sites-available/topayu.ru /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# Перед этим: docker compose up -d (gateway слушает 127.0.0.1:8080)

server {
    listen 80;
    listen [::]:80;
    server_name topayu.ru www.topayu.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name topayu.ru www.topayu.ru;

    # certbot --nginx -d topayu.ru -d www.topayu.ru
    ssl_certificate     /etc/letsencrypt/live/topayu.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/topayu.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 120m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
