server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: sso-service
          uri: ${SSO_SERVICE_URL:http://sso-service:9001}
          predicates:
            - Path=/auth/**
        - id: admin-service
          uri: ${ADMIN_SERVICE_URL:http://admin-service:9005}
          predicates:
            - Path=/admin/**
        - id: post-service
          uri: ${POST_SERVICE_URL:http://post-service:9003}
          predicates:
            - Path=/posts/**

security:
  jwt:
    secret: ${JWT_SECRET}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:8088,http://127.0.0.1:8088}

management:
  endpoints:
    web:
      base-path: /application
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
