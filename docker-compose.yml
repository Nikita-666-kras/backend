services:
  post-db:
    image: postgres:16
    environment:
      POSTGRES_DB: post_db
      POSTGRES_USER: post
      POSTGRES_PASSWORD: ${POST_DB_PASSWORD}
    volumes:
      - post-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U post -d post_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - blog-net

  sso-db:
    image: postgres:16
    environment:
      POSTGRES_DB: sso_db
      POSTGRES_USER: sso
      POSTGRES_PASSWORD: ${SSO_DB_PASSWORD}
    volumes:
      - sso-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sso -d sso_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - blog-net

  post-service:
    build:
      context: .
      dockerfile: article-service/Dockerfile
    depends_on:
      post-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://post-db:5432/post_db
      SPRING_DATASOURCE_USERNAME: post
      SPRING_DATASOURCE_PASSWORD: ${POST_DB_PASSWORD}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      MEDIA_STORAGE_PATH: /data/media
      MEDIA_MAX_IMAGE_BYTES: ${MEDIA_MAX_IMAGE_BYTES:-10485760}
      MEDIA_MAX_VIDEO_BYTES: ${MEDIA_MAX_VIDEO_BYTES:-104857600}
    volumes:
      - media-data:/data/media
    networks:
      - blog-net
    expose:
      - "9003"

  sso-service:
    build:
      context: .
      dockerfile: sso-service/Dockerfile
    depends_on:
      sso-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://sso-db:5432/sso_db
      SPRING_DATASOURCE_USERNAME: sso
      SPRING_DATASOURCE_PASSWORD: ${SSO_DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      APP_SEED_USERS: ${APP_SEED_USERS:-false}
    networks:
      - blog-net
    expose:
      - "9001"

  admin-service:
    build:
      context: .
      dockerfile: admin-service/Dockerfile
    depends_on:
      - post-service
    environment:
      POST_SERVICE_URL: http://post-service:9003
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - blog-net
    expose:
      - "9005"

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    depends_on:
      - sso-service
      - admin-service
      - post-service
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:8088,http://127.0.0.1:8088}
      SSO_SERVICE_URL: http://sso-service:9001
      ADMIN_SERVICE_URL: http://admin-service:9005
      POST_SERVICE_URL: http://post-service:9003
    networks:
      - blog-net

  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
    depends_on:
      - api-gateway
    ports:
      - "8088:80"
    networks:
      - blog-net

  public-ui:
    build:
      context: ./public-ui
      dockerfile: Dockerfile
      args:
        VITE_SITE_NAME: ${PUBLIC_SITE_NAME:-Блог АТРИС}
    depends_on:
      - api-gateway
    ports:
      - "8089:80"
    networks:
      - blog-net

networks:
  blog-net:
    driver: bridge

volumes:
  post-db-data:
  sso-db-data:
  media-data:
