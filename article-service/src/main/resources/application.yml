server:
  port: 9003

spring:
  application:
    name: post-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/post_db}
    username: ${SPRING_DATASOURCE_USERNAME:post}
    password: ${SPRING_DATASOURCE_PASSWORD:post}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

security:
  internal-api-key: ${INTERNAL_API_KEY}

management:
  endpoints:
    web:
      base-path: /application
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
