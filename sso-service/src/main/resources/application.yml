server:
  port: 9001

spring:
  application:
    name: sso-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/sso_db}
    username: ${SPRING_DATASOURCE_USERNAME:sso}
    password: ${SPRING_DATASOURCE_PASSWORD:sso}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

security:
  jwt:
    secret: ${JWT_SECRET}

app:
  seed-users: ${APP_SEED_USERS:false}

management:
  endpoints:
    web:
      base-path: /application
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
